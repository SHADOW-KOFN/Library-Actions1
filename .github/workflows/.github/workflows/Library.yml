name: 浙财图书馆自动任务

on:
  schedule:
    - cron: "30 12 * * *"  # 北京时间 20:30 运行（测试用）
  workflow_dispatch:       # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Run script
        run: python main.py
