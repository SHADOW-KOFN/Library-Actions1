name: 浙财图书馆自动任务
on:
  schedule:
    - cron: "45 12 * * *"  # 北京时间 20:30 测试
  workflow_dispatch:       # 允许手动运行
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run script
        run: python main.py
